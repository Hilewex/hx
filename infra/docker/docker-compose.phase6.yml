services:
  bff:
    image: hx-bff:phase6
    build:
      context: ../..
      dockerfile: Dockerfile
      target: bff
    environment:
      BFF_PORT: "3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  web:
    image: hx-web:phase6
    build:
      context: ../..
      dockerfile: Dockerfile
      target: web
    environment:
      PORT: "3000"
    depends_on:
      bff:
        condition: service_started

  panel:
    image: hx-panel:phase6
    build:
      context: ../..
      dockerfile: Dockerfile
      target: panel
    environment:
      NEXT_PUBLIC_BFF_URL: "http://bff:3001"
    depends_on:
      bff:
        condition: service_healthy
